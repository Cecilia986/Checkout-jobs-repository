name: Automated Ireland Job Scraper

on:
  schedule:
    # Runs twice daily: At 08:00 and 20:00 UTC (Adjust time as you prefer)
    # Cron format: (Minute Hour Day-of-month Month Day-of-week)
    - cron: '0 8,20 * * *'
  workflow_dispatch: # Allows you to also trigger the script manually from GitHub anytime

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Check out jobs repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Playwright Browsers are Installed
      run: |
        pip install playwright
        playwright install chromium --with-deps

    - name: Execute Scraper Script
      env:
        # Securely pass your private credentials from GitHub Repository Secrets
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python main.py

    - name: Commit and Push sent_jobs.json Update
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add sent_jobs.json
        # Only commit if there are changes in the json history file to prevent workflow errors
        git diff-index --quiet HEAD || git commit -m "chore: update sent jobs history cache [skip ci]"
        git push